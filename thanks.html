<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Proper Shot Coffee</title>
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#f4efe6;
      color:#2b2b2b;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(720px, 100%);
      background:#fff;
      border-radius:16px;
      padding:28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      text-align:center;
      border:1px solid rgba(0,0,0,.06);
    }
    h1{
      margin:0 0 10px;
      font-size:28px;
      letter-spacing:.2px;
    }
    p{
      margin:0 auto;
      max-width:560px;
      line-height:1.5;
      font-size:16px;
      color:#4a4a4a;
    }
    .note{
      margin-top:14px;
      font-size:14px;
      color:#6b6b6b;
    }
    .btn{
      display:inline-block;
      margin-top:18px;
      padding:12px 18px;
      border-radius:10px;
      background:#5b4636;
      color:#fff;
      text-decoration:none;
      font-weight:600;
    }
    .btn:active{ transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Request received ✅</h1>
    <p>
      Thanks for reaching out to <strong>Proper Shot Coffee</strong>.
      We’ll review your details and get back to you shortly to confirm availability and next steps.
    </p>
    <div class="note">
      If it’s urgent, you can also email us directly: <strong>propershotcoffee@gmail.com</strong>
    </div>
    <a class="btn" href="/">Back to the site</a>
  </div>
</body>
</html>
