<!DOCTYPE html>
<html lang="en">
<head>

    height: 100vh;
}
.card {

h1 {

p {

a {

    background: black;
    color: white;

    border-radius: 30px;
    font-weight: 500;
    transition: 0.3s ease;
}
a:hover {
    background: #333;
}
.small {
    margin-top: 20px;
    font-size: 14px;
    color: #888;

<div class="card">
    <h1>Thank You.</h1>

        Your booking request has been received.
